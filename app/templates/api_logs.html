{% extends "base.html" %}

{% block body_class %}api-logs-page-body{% endblock %}

{% block content %}
<section class="api-logs-page">
  <h1 class="page-title">API Logs</h1>
  <p class="api-logs-intro">Server-side API request/response logs. Use <a href="{{ url_for('pages.checkout') }}">Checkout</a> or <a href="{{ url_for('pages.xendit_checkout') }}">Xendit Checkout</a> to trigger requests, then refresh below.</p>
  <div class="adyen-api-logs-section">
    <h2 class="checkout-subtitle">Adyen</h2>
    <div class="adyen-api-logs-toolbar">
      <button type="button" id="adyen-logs-refresh" class="adyen-logs-refresh-btn">Refresh</button>
    </div>
    <div id="adyen-api-logs" class="adyen-api-logs"></div>
  </div>
  <div class="adyen-api-logs-section">
    <h2 class="checkout-subtitle">Xendit</h2>
    <div class="adyen-api-logs-toolbar">
      <button type="button" id="xendit-logs-refresh" class="adyen-logs-refresh-btn">Refresh</button>
    </div>
    <div id="xendit-api-logs" class="adyen-api-logs"></div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(function () {
  var baseUrl = {{ request.url_root | tojson }};
  var headers = { "ngrok-skip-browser-warning": "1" };

  function formatTs(ms) {
    var d = new Date(ms);
    return d.toLocaleTimeString() + '.' + (ms % 1000);
  }

  function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function renderLogs(logsEl, logs, emptyMsg, summaryExtractor) {
    if (!logsEl) return;
    if (!Array.isArray(logs) || logs.length === 0) {
      logsEl.innerHTML = '<p class="adyen-logs-empty">' + escapeHtml(emptyMsg) + '</p>';
      return;
    }
    var html = '';
    for (var i = logs.length - 1; i >= 0; i--) {
      var log = logs[i];
      var summary = log.endpoint + ' — ' + formatTs(log.ts);
      if (log.error) summary += ' — <span class="adyen-logs-err">Error: ' + escapeHtml(log.error) + '</span>';
      else if (summaryExtractor) summary += summaryExtractor(log);
      var reqJson = log.request != null ? JSON.stringify(log.request, null, 2) : '';
      var resJson = log.response != null ? JSON.stringify(log.response, null, 2) : (log.error || '');
      html += '<details class="adyen-log-entry">';
      html += '<summary>' + summary + '</summary>';
      html += '<div class="adyen-log-body">';
      if (reqJson) html += '<div class="adyen-log-block"><strong>Request</strong><pre>' + escapeHtml(reqJson) + '</pre></div>';
      if (resJson) html += '<div class="adyen-log-block"><strong>Response</strong><pre>' + escapeHtml(resJson) + '</pre></div>';
      html += '</div></details>';
    }
    logsEl.innerHTML = html;
  }

  function adyenSummary(log) {
    if (log.response && log.response.resultCode) return ' — ' + escapeHtml(log.response.resultCode);
    return '';
  }

  function xenditSummary(log) {
    if (log.response && log.response.status) return ' — ' + escapeHtml(log.response.status);
    return '';
  }

  var adyenEl = document.getElementById('adyen-api-logs');
  var xenditEl = document.getElementById('xendit-api-logs');

  function fetchAdyenLogs() {
    fetch(baseUrl + 'api/adyen/logs', { method: 'GET', headers: headers })
      .then(function (r) { return r.json(); })
      .then(function (data) { renderLogs(adyenEl, data.logs || [], 'No Adyen API calls yet. Use Checkout to trigger requests, then click Refresh.', adyenSummary); })
      .catch(function () { if (adyenEl) adyenEl.innerHTML = '<p class="adyen-logs-empty">Could not load logs.</p>'; });
  }

  function fetchXenditLogs() {
    fetch(baseUrl + 'api/xendit/logs', { method: 'GET', headers: headers })
      .then(function (r) { return r.json(); })
      .then(function (data) { renderLogs(xenditEl, data.logs || [], 'No Xendit API calls yet. Use Xendit Checkout to trigger requests, then click Refresh.', xenditSummary); })
      .catch(function () { if (xenditEl) xenditEl.innerHTML = '<p class="adyen-logs-empty">Could not load logs.</p>'; });
  }

  var adyenBtn = document.getElementById('adyen-logs-refresh');
  var xenditBtn = document.getElementById('xendit-logs-refresh');
  if (adyenBtn) adyenBtn.addEventListener('click', fetchAdyenLogs);
  if (xenditBtn) xenditBtn.addEventListener('click', fetchXenditLogs);

  fetchAdyenLogs();
  fetchXenditLogs();
})();
</script>
{% endblock %}
